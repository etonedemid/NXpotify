name: Convert Stamps

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [stamps-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stamps repo
        uses: actions/checkout@v4
        with:
          repository: Happynico7504/spotify-wiiu-miiverse-stamps
          path: stamps-repo
          token: ${{ secrets.STAMPS_REPO_TOKEN }}

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Convert, rename, and update packs.json
        run: |
          python3 - <<'EOF'
          from PIL import Image
          import os, json, io

          src = 'stamps-repo'
          exts = {'.png', '.jpg', '.jpeg', '.bmp', '.gif', '.webp'}
          skip = {'packs.json'}
          filenames = sorted(
              f for f in os.listdir(src)
              if os.path.splitext(f)[1].lower() in exts and f not in skip
          )

          # Read all source images into memory before any wipe
          images = []
          for fname in filenames:
              with open(os.path.join(src, fname), 'rb') as fh:
                  images.append((fname, fh.read()))

          # Wipe existing converted stamp*.png to reflect deletes
          for f in os.listdir(src):
              if f.startswith('stamp') and f.endswith('.png'):
                  os.remove(os.path.join(src, f))

          converted = []
          for i, (fname, raw) in enumerate(images, 1):
              out = f'stamp{i}.png'
              img = Image.open(io.BytesIO(raw)).convert('L')
              img = img.resize((100, 100), Image.LANCZOS)
              img = img.point(lambda p: 255 if p > 127 else 0)
              img.convert('RGB').save(os.path.join(src, out))
              converted.append(out)
              print(f'  {fname} -> {out}')

          packs_path = os.path.join(src, 'packs.json')
          with open(packs_path) as f:
              data = json.load(f)
          for pack in data['packs']:
              if pack['id'] == 'official':
                  pack['stamps'] = converted
          with open(packs_path, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(f'Converted {len(converted)} stamp(s)')
          EOF

      - name: Commit and push to stamps repo
        run: |
          cd stamps-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: convert stamps and update packs.json"
          git push
