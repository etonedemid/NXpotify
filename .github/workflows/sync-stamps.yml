name: Sync Stamps to Content

on:
  push:
    branches: [main]
    paths:
      - 'stamps/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy stamps to content/stamps
        run: cp stamps/*.png content/stamps/

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/stamps/
          git commit -m "chore(stamps): sync content/stamps from stamps/"
          git push
