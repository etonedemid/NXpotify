name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/happynico7504/spotify-wiiu-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Build WUHB
        run: make

      - name: Build cache-sweep plugin
        run: make -C plugins/cache-sweep

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify-wiiu
          path: |
            spotify-wiiu.wuhb
            plugins/cache-sweep/spotify-cache-sweep.wps
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spotify-wiiu.wuhb
            plugins/cache-sweep/spotify-cache-sweep.wps
          fail_on_unmatched_files: true

      - name: Update wiiu-latest floating tag (for HBAS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wiiu-latest
          name: Latest Wii U build
          body: |
            Always points to the latest versioned release. Current: ${{ github.ref_name }}
          files: |
            spotify-wiiu.wuhb
            plugins/cache-sweep/spotify-cache-sweep.wps
          fail_on_unmatched_files: true
          make_latest: false
