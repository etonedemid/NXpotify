name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t spotify-wiiu-build -f .github/Dockerfile .

      - name: Build .wuhb
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            spotify-wiiu-build \
            make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify-wiiu-${{ github.sha }}
          path: spotify-wiiu.wuhb

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: spotify-wiiu-${{ github.sha }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: spotify-wiiu.wuhb
          generate_release_notes: true
