name: Bug report
description: Report a crash or unexpected behaviour in Spotify Wii U
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! The more detail you provide, the faster it can be fixed.

        **Before you start:** make sure you are running the latest release from the
        [releases page](../../releases).

  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      description: A clear description of the bug or crash.
      placeholder: e.g. "The app crashed with a beep when I pressed Stick R."
    validations:
      required: true

  - type: textarea
    id: before_crash
    attributes:
      label: What were you doing when it happened?
      description: >
        Describe what you were doing in the moments leading up to the bug —
        which song was playing, what buttons you pressed, whether you had just
        switched devices, etc. This context is often the key to reproducing the issue.
      placeholder: |
        e.g. "I had been playing a playlist for about 10 minutes. I paused the
        song from my phone, then pressed A on the GamePad a few seconds later.
        The screen went back to 'Waiting for Spotify…' but music kept playing."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If you can reproduce it reliably, list the exact steps.
      placeholder: |
        1. Launch Spotify Wii U
        2. Connect from the Spotify app on phone
        3. Let a song play for ~30 s
        4. Press Stick R on the GamePad
        5. App crashes
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: Log file (SD:/spotify_log.txt)
      description: >
        After the crash or bug, copy `spotify_log.txt` from the root of your SD card
        and paste its contents here. This file is created fresh every time the app
        launches and captures everything up to the crash.
      render: text
      placeholder: Paste the full contents of spotify_log.txt here.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Spotify Wii U version
      description: Found on the [releases page](../../releases).
      placeholder: e.g. v1.4.1
    validations:
      required: true

  - type: input
    id: aroma
    attributes:
      label: Aroma version
      description: Shown in the Aroma boot screen or Config Menu.
      placeholder: e.g. 0.2.2 beta
    validations:
      required: false

  - type: dropdown
    id: setup_method
    attributes:
      label: How did you install?
      options:
        - Setup tool (recommended)
        - Manual install
    validations:
      required: true
